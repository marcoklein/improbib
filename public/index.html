<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Improbib — Knowledge Graph</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--border:#2a2d37;--text:#c9d1d9;--muted:#6e7681;--accent:#58a6ff;--green:#3fb950;--orange:#d29922;--red:#f85149;--purple:#a371f7}
*{box-sizing:border-box;margin:0;padding:0}
body{font:13px/1.5 system-ui,monospace;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
#list{width:360px;min-width:280px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#filters{padding:10px;border-bottom:1px solid var(--border);background:var(--surface)}
#filters input{width:100%;padding:6px 10px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;outline:none;font:inherit}
#filters input:focus{border-color:var(--accent)}
#chips{padding:6px 10px;display:flex;flex-wrap:wrap;gap:4px;border-bottom:1px solid var(--border);min-height:30px}
.chip{font-size:11px;padding:2px 7px;border-radius:3px;cursor:pointer;border:1px solid var(--border);white-space:nowrap}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
#count{padding:8px 10px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)}
#elements{flex:1;overflow-y:auto}
.el{padding:10px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.el:hover{background:var(--surface)}
.el.active{background:var(--surface);border-left:3px solid var(--accent);padding-left:7px}
.el-name{font-weight:600;margin-bottom:2px}
.el-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;align-items:center}
.el-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.el-tag{font-size:10px;padding:1px 5px;background:var(--border);border-radius:2px;color:var(--muted)}
.badge{font-size:10px;padding:1px 6px;border-radius:2px;font-weight:600}
.badge-b{background:#1a3a5c;color:var(--accent)}
.badge-i{background:#3a2e1a;color:var(--orange)}
.badge-a{background:#3a1a1a;color:var(--red)}
.badge-lo{background:#1a2e1a;color:var(--green)}.badge-me{background:#2e2e1a;color:var(--orange)}.badge-hi{background:#3a1a1a;color:var(--red)}
#detail{flex:1;overflow-y:auto;padding:20px;min-width:400px}
.d-name{font-size:20px;font-weight:700;margin-bottom:4px}
.d-meta{font-size:12px;color:var(--muted);margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.d-desc{line-height:1.6;margin-bottom:16px}
.d-section{margin-bottom:16px}
.d-section h3{font-size:12px;text-transform:uppercase;color:var(--muted);letter-spacing:.5px;margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:4px}
.d-steps{list-style:decimal inside;line-height:1.6}
.d-steps li{margin-bottom:4px}
.d-step-role{color:var(--purple)}.d-step-constraint{color:var(--orange)}
.chip-set{display:flex;flex-wrap:wrap;gap:4px}
.empty{color:var(--muted);text-align:center;padding:40px 20px}
.loading{color:var(--muted);text-align:center;padding:60px}
</style>
</head>
<body>
<div id="list">
 <div id="filters"><input type="search" id="search" placeholder="Filter by name..." autofocus></div>
 <div id="chips"></div>
 <div id="count"></div>
 <div id="elements"><div class="loading">Loading graph...</div></div>
</div>
<div id="detail"><div class="empty">Select an element</div></div>

<script>
(async function(){
const DIFF=["beginner","intermediate","advanced"];
const ENERGY=["low","medium","high"];

const r=await fetch("/graph.json");
const g=await r.json();
const nodes=g.nodes;
const edges=g.edges;

const byId=Object.fromEntries(nodes.map(n=>[n.id,n]));
const elements=nodes.filter(n=>n.type==="Element");
const tags=[...new Set(nodes.filter(n=>n.type==="Tag").map(n=>n.label))].sort();

// Indexes
const tagEdge=Object.fromEntries(tags.map(t=>[t,[]]));
const mechEdge={}; const skillEdge={};
for(const e of edges){
 if(e.type==="hasTag"){const t=byId[e.to];if(t)tagEdge[t.label].push(e.from)}
 if(e.type==="hasMechanic"){const m=byId[e.to];if(m){const k=m.label;mechEdge[k]=mechEdge[k]||[];mechEdge[k].push(e.from)}}
 if(e.type==="trainsSkill"){const s=byId[e.to];if(s){const k=s.label;skillEdge[k]=skillEdge[k]||[];skillEdge[k].push(e.from)}}
}

// Translation index
const trans=new Map();
for(const e of edges)if(e.type==="translationOf")trans.set(e.from,(trans.get(e.from)||[]).concat(e.to));

// Filter state
let query="",activeTags=new Set(),activeDiff=new Set(),activeEnergy=new Set(),activeMech=null,activeSkill=null;

function update(){
 let es=elements.filter(el=>{
  if(query&&!el.label.toLowerCase().includes(query.toLowerCase()))return false;
  if(activeTags.size&&![...activeTags].every(t=>el.tags.includes(t)))return false;
  if(activeDiff.size&&!activeDiff.has(el.difficulty))return false;
  if(activeEnergy.size&&!activeEnergy.has(el.energyLevel))return false;
  if(activeMech&&!mechEdge[activeMech]?.includes(el.id))return false;
  if(activeSkill&&!skillEdge[activeSkill]?.includes(el.id))return false;
  return true;
 });

 // Sort: name
 es.sort((a,b)=>a.label.localeCompare(b.label));

 document.getElementById("count").textContent=`${es.length} elements`;

 const list=document.getElementById("elements");
 list.innerHTML=es.length?es.map(e=>{
  const d=e.difficulty?`<span class="badge badge-${d[0]}">${d[0]}</span>`:"";
  const en=e.energyLevel?`<span class="badge badge-${en[0]}">${en}</span>`:"";
  const dur=e.typicalDurationMinutes?`<span>${e.typicalDurationMinutes}min</span>`:"";
  const tagBadges=(e.tags||[]).slice(0,3).map(t=>`<span class="el-tag">${t}</span>`).join("");
  return `<div class="el" data-id="${e.id}" onclick="selectEl('${e.id}')">
   <div class="el-name">${esc(e.label)}</div>
   <div class="el-meta">${d}${en}${dur} <span style="color:var(--muted)">${e.languageCode} · ${e.sourceName}</span></div>
   <div class="el-tags">${tagBadges}</div>
  </div>`;
 }).join(""):"<div class='empty'>No elements match</div>";
}

function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c])}

function renderDetail(el){
 const d=document.getElementById("detail");
 const trs=trans.get(el.id)||[];
 const trLinks=trs.map(tid=>{
  const tn=byId[tid];
  return tn?`<span class="chip" onclick="selectEl('${tid}')">${esc(tn.label)} (${tn.languageCode})</span>`:"";
 }).join("");

 const diff=el.difficulty?`<span class="badge badge-${el.difficulty[0]}">${el.difficulty}</span>`:"";
 const energy=el.energyLevel?`<span class="badge badge-${el.energyLevel[0]}">${el.energyLevel}</span>`:"";
 const dur=el.typicalDurationMinutes?`<span>${el.typicalDurationMinutes} min</span>`:"";

 // Get mechanics and skills from edges
 const mechs=edges.filter(e=>e.type==="hasMechanic"&&e.from===el.id).map(e=>byId[e.to]?.label).filter(Boolean);
 const skills=edges.filter(e=>e.type==="trainsSkill"&&e.from===el.id).map(e=>byId[e.to]?.label).filter(Boolean);
 const elTags=el.tags||[];

 const steps=el.howToPlay?.steps;
 const stepsHtml=steps?`<ol class="d-steps">${steps.map(s=>`<li>${esc(s.action)}${s.role?` <span class="d-step-role">(${esc(s.role)})</span>`:""}${s.constraint?` <span class="d-step-constraint">[${esc(s.constraint)}]</span>`:""}</li>`).join("")}</ol>`:"";

 d.innerHTML=`
  <div class="d-name">${esc(el.label)}</div>
  <div class="d-meta">${diff}${energy}${dur} <span>${el.languageCode.toUpperCase()} · ${el.sourceName}</span> <a href="${esc(el.url)}" target="_blank" style="color:var(--accent)">source</a></div>
  <div class="d-desc">${esc(el.description)}</div>
  ${stepsHtml?`<div class="d-section"><h3>How to Play</h3>${stepsHtml}</div>`:""}
  ${mechs.length?`<div class="d-section"><h3>Mechanics</h3><div class="chip-set">${mechs.map(m=>`<span class="chip" onclick="filterMech('${esc(m)}')">${esc(m)}</span>`).join("")}</div></div>`:""}
  ${skills.length?`<div class="d-section"><h3>Skills</h3><div class="chip-set">${skills.map(s=>`<span class="chip" onclick="filterSkill('${esc(s)}')">${esc(s)}</span>`).join("")}</div></div>`:""}
  ${elTags.length?`<div class="d-section"><h3>Tags</h3><div class="chip-set">${elTags.map(t=>`<span class="chip" onclick="toggleTag('${esc(t)}')">${esc(t)}</span>`).join("")}</div></div>`:""}
  ${trLinks?`<div class="d-section"><h3>Translations</h3><div class="chip-set">${trLinks}</div></div>`:""}
 `;

 document.querySelectorAll(".el").forEach(e=>e.classList.toggle("active",e.dataset.id===el.id));
 if(el.id) document.querySelector(`[data-id="${el.id}"]`)?.classList.add("active");
}

function selectFirst(){
 const first=document.querySelector(".el");
 if(first) selectEl(first.dataset.id);
}

function reselect(){
 const active=document.querySelector(".el.active");
 if(active) selectEl(active.dataset.id);
}

window.selectEl=function(id){
 const el=byId[id];
 if(!el)return;
 renderDetail(el);
 document.querySelectorAll(".el").forEach(e=>e.classList.toggle("active",e.dataset.id===id));
};

window.toggleTag=function(t){
 if(activeTags.has(t))activeTags.delete(t);else activeTags.add(t);
 if(activeMech){activeMech=null;updateChips()}
 if(activeSkill){activeSkill=null;updateChips()}
 renderChips();update();reselect();
};

window.filterMech=function(m){
 activeMech=m===activeMech?null:m;
 activeTags.clear();activeDiff.clear();activeEnergy.clear();activeSkill=null;
 renderChips();update();reselect();
};

window.filterSkill=function(s){
 activeSkill=s===activeSkill?null:s;
 activeTags.clear();activeDiff.clear();activeEnergy.clear();activeMech=null;
 renderChips();update();reselect();
};

function toggleDiff(d){
 if(activeDiff.has(d))activeDiff.delete(d);else activeDiff.add(d);
 renderChips();update();reselect();
}
function toggleEnergy(e){
 if(activeEnergy.has(e))activeEnergy.delete(e);else activeEnergy.add(e);
 renderChips();update();reselect();
}

function renderChips(){
 const chips=document.getElementById("chips");
 let html="";
 for(const d of DIFF)html+=`<span class="chip${activeDiff.has(d)?" on":""}" onclick="toggleDiff('${d}')">${d[0]}</span>`;
 html+='<span style="color:var(--border);margin:0 4px">|</span>';
 for(const e of ENERGY)html+=`<span class="chip${activeEnergy.has(e)?" on":""}" onclick="toggleEnergy('${e}')">${e}</span>`;
 html+='<span style="color:var(--border);margin:0 4px">|</span>';
 if(activeMech)html+=`<span class="chip on">🛠 ${esc(activeMech)}</span>`;
 if(activeSkill)html+=`<span class="chip on">🎯 ${esc(activeSkill)}</span>`;
 for(const t of activeTags)html+=`<span class="chip on" onclick="toggleTag('${esc(t)}')">#${esc(t)}</span>`;
 chips.innerHTML=html||'<span style="color:var(--muted);font-size:11px">Click tags/mechanics/skills in detail to filter</span>';
}

function updateChips(){renderChips()}

document.getElementById("search").oninput=function(){
 query=this.value;
 update();
 reselect();
};

renderChips();
update();
selectFirst();
})();
</script>
</body>
</html>
