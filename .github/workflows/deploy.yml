name: Deploy to Dokku

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: improbib-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Write git commit version
        run: |
          git rev-parse HEAD > GIT_COMMIT

      - name: Deploy to Dokku
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add -f GIT_COMMIT
          git commit -m "deploy: ${GITHUB_SHA:0:7}" --allow-empty
          git remote add dokku dokku@impromat.app:improbib
          git push dokku HEAD:main
